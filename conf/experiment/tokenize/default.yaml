# @package _global_

defaults:
  - /formalization: default
  - _self_

tokenizer_id: "bigcode/starcoder2-3b"

min_seq_length: 0
max_seq_length: 16000

input:
  name: "stack-v2"
  config: "${get_language_id:${formalization.language}}"
  revision: "main"

output:
  name: "stack-v2-${get_name:${tokenizer_id}}"
  config: "${get_language_id:${formalization.language}}"
  revision: "main"
